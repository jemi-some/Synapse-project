<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스크롤 테스트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f0f0f0;
  font-family: system-ui, -apple-system, sans-serif;
}

#root {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  margin: 0 auto;
  background: #FBE8D3;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 3px solid red;
}

.main-content {
  flex: 1;
  width: 100%;
  min-height: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 3px solid blue;
}

.content-scroll {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
  padding: 0;
  border: 3px solid green;
}

router-view {
  flex: 0 0 auto;
  min-height: 0;
  border: 2px solid purple;
}

.image-display-container {
  width: 100%;
  min-height: 300px;
  padding: 20px;
  background: rgba(200, 200, 255, 0.3);
}

.chat-layout {
  flex: 0 0 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 16px 20px 0;
  margin-bottom: 200px;
  border: 3px solid orange;
}

.chat-bubbles-container {
  flex: 0 0 auto;
  width: 100%;
  padding: 0 0 20px 0;
  border: 3px solid pink;
}

.chat-bubbles {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.bubble {
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 12px;
  border: 1px solid rgba(0, 0, 0, 0.1);
}

.chat-input {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 12px 20px 24px;
  background: rgba(251, 232, 211, 0.95);
  border: 3px solid brown;
}

.info {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  max-width: 300px;
}
</style>
</head>
<body>
<div class="info">
  <strong>테스트 설명:</strong><br>
  - Red: #root (100vh)<br>
  - Blue: .main-content<br>
  - Green: .content-scroll (스크롤 영역)<br>
  - Purple: router-view<br>
  - Orange: .chat-layout<br>
  - Pink: .chat-bubbles-container<br>
  <br>
  <button onclick="addBubble()">버블 추가</button>
  <button onclick="checkScroll()">스크롤 체크</button>
</div>

<div id="root">
  <div class="main-content">
    <div class="content-scroll">
      <router-view>
        <div class="image-display-container">
          <h3>이미지 영역</h3>
          <p>min-height: 300px</p>
        </div>
      </router-view>
      <div class="chat-layout">
        <div class="chat-bubbles-container">
          <div class="chat-bubbles" id="bubbles">
            <div class="bubble">메시지 1</div>
            <div class="bubble">메시지 2</div>
            <div class="bubble">메시지 3</div>
            <div class="bubble">메시지 4</div>
            <div class="bubble">메시지 5</div>
          </div>
        </div>
      </div>
    </div>
    <div class="chat-input">
      채팅 입력창 (고정)
    </div>
  </div>
</div>

<script>
let bubbleCount = 5;

function addBubble() {
  bubbleCount++;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = '메시지 ' + bubbleCount;
  document.getElementById('bubbles').appendChild(bubble);
  
  const contentScroll = document.querySelector('.content-scroll');
  contentScroll.scrollTop = contentScroll.scrollHeight;
  
  checkScroll();
}

function checkScroll() {
  const contentScroll = document.querySelector('.content-scroll');
  const info = {
    scrollHeight: contentScroll.scrollHeight,
    clientHeight: contentScroll.clientHeight,
    scrollTop: contentScroll.scrollTop,
    isScrollable: contentScroll.scrollHeight > contentScroll.clientHeight,
    overflow: window.getComputedStyle(contentScroll).overflowY
  };
  
  console.log('📊 스크롤 상태:', info);
  
  alert(
    `스크롤 높이: ${info.scrollHeight}px\n` +
    `보이는 높이: ${info.clientHeight}px\n` +
    `스크롤 위치: ${info.scrollTop}px\n` +
    `스크롤 가능? ${info.isScrollable ? 'YES ✅' : 'NO ❌'}\n` +
    `overflow-y: ${info.overflow}`
  );
}

// 초기 체크
setTimeout(checkScroll, 100);
</script>
</body>
</html>
